{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Expenses</title>
    <link rel="stylesheet" href="{% static 'expenses/style.css' %}">
</head>
<body>

<h1>My Expenses</h1>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Expense Name</th>
            <th>Amount (USD)</th>
            <th>Date</th>
        </tr>
    </thead>
    <tbody>
        {% for expense in expenses %}
        <tr data-id="{{ expense.id }}" data-name="{{ expense.title }}" data-amount="{{ expense.amount }}" data-date="{{ expense.date }}">
            <td>{{ expense.id }}</td>
            <td>{{ expense.title }}</td>
            <td>{{ expense.amount }}</td>
            <td>{{ expense.date }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">No expenses added yet.</td>
        </tr>
        {% endfor %}
    </tbody>
    <tfoot>
    <tr>
        <td colspan="2"><strong>Total</strong></td>
        <td><strong>{{ total }}</strong></td>
        <td></td>
    </tr>
</tfoot>
</table>
<button class="add-expense-btn">Add New Expense</button>
<!-- <script src="{% static 'expenses/script.js' %}"></script> -->
</body>
</html>
